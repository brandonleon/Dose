name: Dose
options:
  bundleIdPrefix: com.brandonleon
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  generateEmptyDirectories: false
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targets:
  Dose:
    type: application
    platform: iOS
    sources:
      - path: Dose
        excludes:
          - "Preview Content/**"
          - "Info.plist"
      - path: Dose/Preview Content
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brandonleon.Dose
        INFOPLIST_FILE: Dose/Info.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: Dose/Dose.entitlements
        ENABLE_PREVIEWS: YES
    entitlements:
      path: Dose/Dose.entitlements
    dependencies:
      - target: DoseWidgetExtension
    info:
      path: Dose/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - dose
            CFBundleURLName: "com.brandonleon.Dose"

  DoseWidgetExtension:
    type: app-extension
    platform: iOS
    product: DoseWidgetExtension
    sources:
      - path: DoseWidget
        excludes:
          - "Info.plist"
      # Shared models needed by the widget
      - path: Dose/Models
      - path: Dose/Theme/AccentColor.swift
      - path: Dose/Theme/Color+Extensions.swift
      - path: Dose/Services/SharedContainer.swift
      - path: Dose/Utilities/PersistenceConfiguration.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brandonleon.Dose.DoseWidget
        INFOPLIST_FILE: DoseWidget/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: DoseWidget/DoseWidgetExtension.entitlements
    entitlements:
      path: DoseWidget/DoseWidgetExtension.entitlements
    info:
      path: DoseWidget/Info.plist
      properties:
        CFBundleDisplayName: DoseWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
